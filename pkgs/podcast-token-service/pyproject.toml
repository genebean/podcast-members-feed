[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "podcast-token-service"
version = "0.1.0"
description = "BTCPay subscription to private podcast RSS feed bridge"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "aiosqlite",
    "httpx",
    "python-dotenv",
    "cryptography",
    "cffi",
    "websockets",
    "prometheus-client",
]

[project.scripts]
podcast-token-service  = "token_service:main"
podcast-members-manage = "manage:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["token_service*", "manage*"]
