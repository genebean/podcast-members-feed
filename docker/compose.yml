# docker-compose.yml — Podcast token service for Path A (Umbrel + VPS)
#
# Deploy this on the VPS alongside nginx and Tailscale.
# The token service connects back to your Umbrel's BTCPay/PodServer
# via the Tailscale network.
#
# Setup:
#   1. Copy .env.example to .env and fill in all values
#   2. Pull or build the image:
#        docker pull ghcr.io/YOUR_ORG/podcast-token-service:latest
#        # or build locally: docker build -t podcast-token-service .
#   3. docker compose up -d
#
# The service listens on 127.0.0.1:8765 only.
# nginx proxies /rss/, /webhook/btcpay, /api/feed-url, and /health to it.
# The /admin/ endpoints are NOT proxied — access them directly on the host:
#   curl -s http://127.0.0.1:8765/admin/stats

services:
  token-service:
    image: ghcr.io/YOUR_ORG/podcast-token-service:latest  # FIXME
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./data:/var/lib/podcast-token-service
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8765/health"]
      interval: 30s
      timeout:  5s
      retries:  3
